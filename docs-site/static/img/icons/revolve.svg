  <!-- outer top rim -->
  <path d="M26.0 12.8 L25.8 11.9 L25.0 11.0 L23.8 10.2 L22.3 9.5 L20.4 9.0 L18.3 8.7 L16.1 8.6 L13.8 8.7 L11.7 9.0 L9.8 9.5 L8.2 10.2 L7.0 10.9 L6.3 11.8 L6.0 12.8 L6.2 13.7 L6.9 14.6" />
