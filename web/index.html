<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>BearCAD</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #1b1b1f;
      /* The app handles all touch gestures itself: no browser pinch-zoom, pan,
         pull-to-refresh, double-tap zoom, or long-press selection. */
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #cfcfd4;
      font: 15px/1.4 system-ui, sans-serif;
      text-align: center;
      padding: 0 24px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div><strong>BearCAD</strong> is loading…</div>
    <div>First load downloads the whole app (~15&nbsp;MB); it's cached afterwards.</div>
  </div>
  <canvas id="bearcad_canvas"></canvas>
  <script>
    // iOS Safari implements pinch page-zoom through its proprietary gesture events
    // and ignores user-scalable=no; swallowing these keeps the pinch for the app.
    for (const type of ["gesturestart", "gesturechange", "gestureend"]) {
      document.addEventListener(type, (e) => e.preventDefault(), { passive: false });
    }
    // Double-tap zoom, likewise.
    document.addEventListener("dblclick", (e) => e.preventDefault(), { passive: false });
  </script>
  <script type="module">
    // The OCCT geometry kernel is a second wasm module (Emscripten); load it first so
    // the app's kernel bridge finds it. If it fails, the app still runs — with the
    // lean-build fallbacks (no solid cuts) and a status note in Help > About.
    try {
      const { default: BearcadKernel } = await import("./kernel.js");
      globalThis.bearcadKernel = await BearcadKernel();
    } catch (err) {
      console.warn("BearCAD: geometry kernel failed to load; running lean:", err);
    }
    // The Lua interpreter is a third wasm module (Emscripten); load it so File → Load
    // Script can run .lua files. If it fails, the app still runs — scripting is just
    // unavailable, reported when you try to load a script.
    try {
      const { default: BearcadLua } = await import("./lua.js");
      globalThis.bearcadLua = await BearcadLua();
    } catch (err) {
      console.warn("BearCAD: Lua interpreter failed to load; scripting disabled:", err);
    }
    const { default: init } = await import("./bearcad.js");
    init()
      .then(() => document.getElementById("loading")?.remove())
      .catch((err) => {
        const el = document.getElementById("loading");
        // eframe throws a benign "Using exceptions for control flow" on startup in
        // some builds; anything else is a real failure worth showing.
        if (el && !String(err).includes("control flow")) {
          el.innerHTML =
            "<div><strong>BearCAD couldn't start.</strong></div>" +
            "<div>" + String(err) + "</div>" +
            "<div>A browser with WebGPU or WebGL2 is required.</div>";
        } else {
          el?.remove();
        }
      });
  </script>
</body>
</html>
