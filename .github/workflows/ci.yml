name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        id: cargo-cache
        uses: Swatinem/rust-cache@v2
        with:
          # Default is false: a failed job does not update the cache, so repeated
          # failures keep paying full dependency compile cost.
          cache-on-failure: true
          shared-key: ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev \
            xvfb

      # This job checks the lean no-kernel (fallback) build — `occt` is a default
      # feature now (#89), so `--no-default-features` builds without OCCT / a C++
      # toolchain, keeping this check fast. The kernel build is covered by the
      # `occt` job below.
      - name: cargo test (no kernel)
        run: |
          if [[ "${{ steps.cargo-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Cargo cache hit — dependency artifacts restored."
          else
            echo "Cargo cache miss — compiling dependencies (~2 min on a cold runner)."
          fi
          cargo test --no-default-features

      # cargo test builds a test harness, not target/debug/bearcad — needed for smoke/scripts.
      - name: cargo build (no kernel)
        run: cargo build --no-default-features

      - name: Launch smoke test
        run: |
          set +e
          timeout 2 xvfb-run -a ./target/debug/bearcad
          code=$?
          set -e
          if [[ $code -eq 0 || $code -eq 124 ]]; then
            echo "App launched successfully (exit code $code)."
          else
            echo "App failed to launch (exit code $code)." >&2
            exit "$code"
          fi

      - name: Run example scripts
        run: |
          shopt -s nullglob
          scripts=(examples/*.lua)
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No example Lua scripts found in examples/" >&2
            exit 1
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            xvfb-run -a ./target/debug/bearcad --script "$script" --exit
          done

  # Builds BearCAD with the statically-linked OpenCASCADE kernel (#86/#89). The
  # OCCT build is expensive, so it's cached on the pinned submodule + build-script
  # hash — after the first cold run it's restored, not rebuilt. Linux only here;
  # the macOS OCCT path (-dead_strip) is exercised by the macOS release build.
  occt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Submodules are fetched only on an OCCT cache miss (below), to avoid the
        # large OCCT clone on every run.
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: occt-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev \
            xvfb

      - name: Cache OCCT static build
        id: occt-cache
        uses: actions/cache@v4
        with:
          # build.rs resolves OCCT from this prefix by default (or $OCCT_DIR).
          path: third_party/OCCT/occt-install
          # Bump the version segment when the OCCT submodule commit changes.
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles('scripts/build-occt.sh') }}

      - name: Build OCCT (cache miss only)
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          scripts/build-occt.sh

      - name: cargo test (occt)
        run: cargo test --features occt

      - name: cargo build (occt)
        run: cargo build --features occt

      - name: Launch smoke test (occt)
        run: |
          set +e
          timeout 15 xvfb-run -a ./target/debug/bearcad --exit --timeout 10
          code=$?
          set -e
          if [[ $code -eq 0 || $code -eq 124 ]]; then
            echo "occt build launched successfully (exit code $code)."
          else
            echo "occt build failed to launch (exit code $code)." >&2
            exit "$code"
          fi

  # EXPERIMENTAL (#96): Windows/MSVC static-OCCT kernel build. Expected to fail
  # initially — this job exists to produce real MSVC build/link logs that the
  # scaffold (scripts/build-occt.ps1 + build.rs windows arm) is iterated against.
  # It is non-blocking (continue-on-error) and deliberately NOT in any job's
  # `needs`: the Windows *release* keeps shipping the --no-default-features
  # fallback until this build is proven, at which point build-release flips
  # `kernel: true` for Windows.
  windows-occt:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        # Submodules are fetched only on an OCCT cache miss (below), to avoid the
        # large OCCT clone on every run.
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: occt-windows

      - name: Cache OCCT static build
        id: occt-cache
        uses: actions/cache@v4
        with:
          # build.rs resolves OCCT from this prefix by default (or $OCCT_DIR).
          path: third_party/OCCT/occt-install
          # Bump the version segment when the OCCT submodule commit changes.
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles('scripts/build-occt.ps1') }}

      - name: Build OCCT (cache miss only)
        if: steps.occt-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          pwsh scripts/build-occt.ps1

      # On Windows the default feature set already includes `occt`; the explicit
      # flag keeps this job self-describing.
      - name: cargo build (occt)
        run: cargo build --features occt

      - name: cargo test (occt)
        run: cargo test --features occt

  build-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [ci, occt]
    strategy:
      fail-fast: false
      matrix:
        # `kernel` selects whether the shipped binary links the OCCT kernel.
        # macOS/Linux ship with it (the default build); Windows lags (no clean
        # static OCCT/MSVC build yet — see #89) and ships the no-kernel fallback
        # build via --no-default-features.
        include:
          - runner: ubuntu-latest
            os_slug: linux-x86_64
            artifact: bearcad-linux-x86_64.tar.gz
            kernel: true
            cargo_flags: ""
          - runner: macos-latest
            os_slug: macos-aarch64
            artifact: bearcad.dmg
            kernel: true
            cargo_flags: ""
          - runner: windows-latest
            os_slug: windows-x86_64
            artifact: bearcad.exe
            kernel: false
            cargo_flags: "--no-default-features"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: release-${{ matrix.os_slug }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev

      # OCCT kernel for the platforms that ship it (macOS/Linux). Cached on the
      # pinned submodule + build script, matching the `occt` CI job's key so Linux
      # reuses the same build. Windows (kernel == false) skips all of this.
      - name: Cache OCCT static build
        if: matrix.kernel
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: third_party/OCCT/occt-install
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles('scripts/build-occt.sh') }}

      - name: Build OCCT (cache miss only)
        if: matrix.kernel && steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          scripts/build-occt.sh

      # macOS/Linux use the default build (occt); Windows passes --no-default-features.
      - name: cargo build --release
        run: cargo build --release ${{ matrix.cargo_flags }}

      - name: Package Linux release
        if: matrix.os_slug == 'linux-x86_64'
        run: bash scripts/package-release.sh linux

      - name: Package macOS release
        if: matrix.os_slug == 'macos-aarch64'
        run: bash scripts/package-release.sh macos

      - name: Package Windows release
        if: matrix.os_slug == 'windows-x86_64'
        shell: pwsh
        run: pwsh scripts/package-windows.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: bearcad-${{ matrix.os_slug }}
          path: ${{ matrix.artifact }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }} build ${{ github.run_number }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: artifacts/*

      - name: Prune old draft releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/prune-draft-releases.sh 2