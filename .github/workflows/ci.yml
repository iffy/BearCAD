name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  # The Linux test job (todoer #470): builds BearCAD with the statically-linked
  # OpenCASCADE kernel (#86/#89) — the shipping configuration — and runs the full
  # test suite, launch smoke, example scripts, and interaction tests against it.
  # The OCCT build is expensive, so it's cached on the pinned submodule +
  # build-script hash — after the first cold run it's restored, not rebuilt. The
  # macOS OCCT path (-dead_strip) is exercised by the macOS release build.
  occt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Submodules are fetched only on an OCCT cache miss (below), to avoid the
        # large OCCT clone on every run.
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: occt-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev \
            xvfb

      - name: Cache OCCT static build
        id: occt-cache
        uses: actions/cache@v4
        with:
          # build.rs resolves OCCT from this prefix by default (or $OCCT_DIR).
          path: third_party/OCCT/occt-install
          # Bump the version segment when the OCCT submodule commit changes.
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles('scripts/build-occt.sh') }}

      - name: Fetch solvespace submodule (libslvs sketch solver)
        run: |
          git submodule update --init --depth 1 third_party/solvespace
          git -C third_party/solvespace submodule update --init --depth 1 extlib/eigen extlib/mimalloc

      - name: Build OCCT (cache miss only)
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          scripts/build-occt.sh

      - name: cargo test (occt)
        run: cargo test

      - name: cargo build (occt)
        run: cargo build

      - name: Launch smoke test (occt)
        run: |
          set +e
          timeout 15 xvfb-run -a ./target/debug/bearcad --exit --timeout 10
          code=$?
          set -e
          if [[ $code -eq 0 || $code -eq 124 ]]; then
            echo "occt build launched successfully (exit code $code)."
          else
            echo "occt build failed to launch (exit code $code)." >&2
            exit "$code"
          fi

      - name: Run example scripts
        run: |
          shopt -s nullglob
          scripts=(examples/*.lua)
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No example Lua scripts found in examples/" >&2
            exit 1
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            # --timeout force-exits (code 1) if the app hasn't finished on its own —
            # a hung script (e.g. headless GPU/EGL issues under Xvfb) must fail the
            # job instead of hanging it indefinitely.
            xvfb-run -a ./target/debug/bearcad --script "$script" --exit --timeout 30
          done

      # Interaction regression tests (todoer #459): scripted *real* pointer input
      # (raw-input synthetic events) driving click-select and drags end to end.
      # A lua assert failure exits non-zero (#125) and fails the job.
      - name: Run interaction tests
        run: |
          shopt -s nullglob
          tests=(tests/interaction/*.lua)
          if [[ ${#tests[@]} -eq 0 ]]; then
            echo "No interaction tests found in tests/interaction/" >&2
            exit 1
          fi
          failed=0
          for script in "${tests[@]}"; do
            echo "::group::Running $script"
            if xvfb-run -a ./target/debug/bearcad --script "$script" --exit --timeout 60; then
              echo "OK $script"
            else
              echo "::error::FAILED $script (exit $?)"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"

  # Windows/MSVC static-OCCT kernel build + tests (#96, proven; todoer #468): the
  # same configuration the Windows release ships, so kernel regressions on
  # Windows are caught on every push/PR like the Linux `occt` job does.
  windows-occt:
    runs-on: windows-latest
    steps:
      - name: Checkout
        # Submodules are fetched only on an OCCT cache miss (below), to avoid the
        # large OCCT clone on every run.
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: occt-windows

      - name: Cache OCCT static build
        id: occt-cache
        uses: actions/cache@v4
        with:
          # build.rs resolves OCCT from this prefix by default (or $OCCT_DIR).
          path: third_party/OCCT/occt-install
          # Bump the version segment when the OCCT submodule commit changes.
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles('scripts/build-occt.ps1') }}

      - name: Fetch solvespace submodule (libslvs sketch solver)
        run: |
          git submodule update --init --depth 1 third_party/solvespace
          git -C third_party/solvespace submodule update --init --depth 1 extlib/eigen extlib/mimalloc

      - name: Build OCCT (cache miss only)
        if: steps.occt-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          pwsh scripts/build-occt.ps1

      # On Windows the default feature set already includes `occt`; the explicit
      # flag keeps this job self-describing.
      - name: cargo build (occt)
        run: cargo build

      - name: cargo test (occt)
        run: cargo test

  build-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [occt, windows-occt]
    strategy:
      fail-fast: false
      matrix:
        # Every platform ships the OCCT kernel (todoer #468); `occt_script` is the
        # per-OS static-OCCT build script, hashed into the cache key so each
        # platform shares its cache with the corresponding test job.
        include:
          - runner: ubuntu-latest
            os_slug: linux-x86_64
            artifact: bearcad-linux-x86_64.tar.gz
            kernel: true
            occt_script: scripts/build-occt.sh
            occt_build: bash scripts/build-occt.sh
            cargo_flags: ""
          - runner: macos-latest
            os_slug: macos-aarch64
            artifact: bearcad.dmg
            kernel: true
            occt_script: scripts/build-occt.sh
            occt_build: bash scripts/build-occt.sh
            cargo_flags: ""
          - runner: windows-latest
            os_slug: windows-x86_64
            artifact: bearcad.exe
            kernel: true
            occt_script: scripts/build-occt.ps1
            occt_build: pwsh scripts/build-occt.ps1
            cargo_flags: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: release-${{ matrix.os_slug }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libssl-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libgtk-3-dev

      # OCCT kernel, cached on the pinned submodule + per-OS build script,
      # matching the `occt`/`windows-occt` CI jobs' keys so each platform reuses
      # the same build.
      - name: Cache OCCT static build
        if: matrix.kernel
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: third_party/OCCT/occt-install
          key: occt-install-${{ runner.os }}-v8.0.0-${{ hashFiles(matrix.occt_script) }}

      - name: Fetch solvespace submodule (libslvs sketch solver)
        run: |
          git submodule update --init --depth 1 third_party/solvespace
          git -C third_party/solvespace submodule update --init --depth 1 extlib/eigen extlib/mimalloc

      - name: Build OCCT (cache miss only)
        if: matrix.kernel && steps.occt-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git submodule update --init --depth 1 third_party/OCCT
          ${{ matrix.occt_build }}

      # Bake the exact release tag into the binary (todoer #466): the `release` job tags
      # v{version}-build.{run_number} *after* this build, and the shallow checkout has no
      # tags for `git describe` — without this the shipped binary only knows its crate
      # version and the update badge offers the very build being run.
      - name: Bake release identity
        shell: bash
        run: echo "BEARCAD_RELEASE_TAG=v$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      # Every platform builds the default feature set (kernel included).
      - name: cargo build --release
        run: cargo build --release ${{ matrix.cargo_flags }}

      - name: Package Linux release
        if: matrix.os_slug == 'linux-x86_64'
        run: bash scripts/package-release.sh linux

      - name: Package macOS release
        if: matrix.os_slug == 'macos-aarch64'
        run: bash scripts/package-release.sh macos

      - name: Package Windows release
        if: matrix.os_slug == 'windows-x86_64'
        shell: pwsh
        run: pwsh scripts/package-windows.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: bearcad-${{ matrix.os_slug }}
          path: ${{ matrix.artifact }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }} build ${{ github.run_number }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: artifacts/*

      - name: Prune old draft releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/prune-draft-releases.sh 2